{% extends 'base.html' %}
{% block title %}Post Blood Request{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card wide-card">
    <div class="auth-header">
      <span class="auth-icon">🆘</span>
      <h2>Post a Blood Request</h2>
      <p>Fill in the details — donors will contact you directly</p>
    </div>
    <form method="POST" action="{{ url_for('create_request') }}" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label>Blood Group Required</label>
          <select name="blood_group" required>
            <option value="">Select</option>
            {% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
            <option value="{{ bg }}">{{ bg }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Units Needed</label>
          <input type="number" name="units" min="1" max="20" value="1" required/>
        </div>
        <div class="form-group">
          <label>Urgency Level</label>
          <select name="urgency" required>
            <option value="Normal">Normal</option>
            <option value="Urgent">Urgent</option>
            <option value="Critical">Critical</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Hospital Name</label>
        <input type="text" name="hospital" placeholder="e.g. Apollo Hospital" required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City</label>
          <input type="text" name="city" placeholder="City" required/>
        </div>
        <div class="form-group">
          <label>State</label>
          <input type="text" name="state" placeholder="State" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Additional Notes (optional)</label>
        <textarea name="notes" rows="3" placeholder="Any additional information..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Post Request</button>
    </form>
  </div>
</div>
{% endblock %}
